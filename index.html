<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Công Cụ Chuyển Đổi Đơn Vị</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #464646; }
        .container { max-width: 400px; background: rgb(124, 124, 124); padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #323232; color: rgb(255, 255, 255); border: none; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; padding: 10px; background-color: #e2f0d9; border-radius: 4px; font-weight: bold; color: #385723; }
    </style>
</head>
<body>

<div class="container">
    <h2>Đổi Đơn Vị Đo Lường</h2>
    
    <div class="form-group">
        <label for="inputValue">Nhập giá trị:</label>
        <input type="number" id="inputValue" value="10">
    </div>

    <div class="form-group">
        <label for="typeSelect">Chọn loại đại lượng:</label>
        <select id="typeSelect" onchange="updateUnits()">
            <option value="nhiet_do">Nhiệt độ</option>
            <option value="ap_suat">Áp suất</option>
            <option value="flow_rate">Lưu lượng</option>
            <option value="nang_luong">Năng lượng</option>
            <option value="cong_suat">Công suất</option>
            <option value="khoi_luong">Khối lượng</option>
            <option value="nong_do">Nồng độ</option>
        </select>
    </div>

    <div class="form-group">
        <label for="fromUnit">Từ đơn vị:</label>
        <select id="fromUnit"></select>
    </div>

    <div class="form-group">
        <label for="toUnit">Sang đơn vị:</label>
        <select id="toUnit"></select>
    </div>

    <button onclick="convert()">Chuyển đổi</button>

    <div class="result-box" id="ketQuaBox">
        <p>Kết Quả: <span id="result">--</span></p>
    </div>
</div>

<script>
// Danh sách đơn vị mẫu
const unitData = {
    nhiet_do: { 'C': 'Độ C (°C)', 'F': 'Độ F (°F)', 'K': 'Kelvin (K)' },
    ap_suat: { 'barg': 'Barg (barg)','bar': 'Bar (bar)', 'psi': 'Pounds per square inch (psi)' },
    flow_rate: { 'MMSCMD': 'Million standard cubic meters per day (MMSCMD)', 'MMSCFD': 'Million standard cubic feet per day (MMSCFD)' ,
        'L/s': 'Lít trên giây (L/s)', 'm³/h': 'Khối mét trên giờ (m³/h)'
    },
    nang_luong: { 'mmBTU': 'BTU (mmBTU)', 'GJ': 'Giga joule (GJ)'},
    khoi_luong: { 'kg': 'Kilogram (kg)', 'lb': 'Pound (lb)', 'oz': 'Ounce (oz)' },
    cong_suat: {'kw'  : 'Kilowatt (kW)', 'HP': 'Horsepower (HP)'},
    nong_do: { 'ppm': 'Phần triệu (ppm)', 'ppb': 'Phần tỷ (ppb)' }
};

// Cập nhật danh sách đơn vị khi người dùng đổi Loại đại lượng
function updateUnits() {
    const type = document.getElementById('typeSelect').value;
    const fromSelect = document.getElementById('fromUnit');
    const toSelect = document.getElementById('toUnit');
    
    fromSelect.innerHTML = '';
    toSelect.innerHTML = '';
    
    for (let key in unitData[type]) {
        fromSelect.options.add(new Option(unitData[type][key], key));
        toSelect.options.add(new Option(unitData[type][key], key));
    }
}

// Hàm tính toán logic chuyển đổi
function convert() {
    const value = parseFloat(document.getElementById('inputValue').value);
    const type = document.getElementById('typeSelect').value;
    const from = document.getElementById('fromUnit').value;
    const to = document.getElementById('toUnit').value;
    let result = 0;

    if (from === to) {
        result = value;
    } else if (type === 'nhiet_do') {
        if (from === 'C' && to === 'F') {
            result = (value * 9/5) + 32;
        } else if (from === 'F' && to === 'C') {
            result = (value - 32) * 5/9;
        } else if (from === 'C' && to === 'K') {
            result = value + 273.15;
        } else if (from === 'K' && to === 'C') {
            result = value - 273.15;
        } else if (from === 'F' && to === 'K') {
            result = (value - 32) * 5/9 + 273.15;
        } else if (from === 'K' && to === 'F') {
            result = (value - 273.15) * 9/5 + 32;
        }  
    }
    else if (type === 'ap_suat') {
        if (from === 'bar' && to === 'psi') {
            result = value * 14.5038;
        } else if (from === 'psi' && to === 'bar') {
            result = value / 14.5038;
        } else if (from === 'barg' && to === 'psi') {
            result = (value + 1.01325) * 14.5038;
        } else if (from === 'psi' && to === 'barg') {
            result = (value / 14.5038) - 1.01325;
        } else if (from === 'barg' && to === 'bar') {
            result = value + 1.01325;
        } else if (from === 'bar' && to === 'barg') {
            result = value - 1.01325;
        }
    }
    else if (type === 'flow_rate') {
        if (from === 'MMSCMD' && to === 'MMSCFD') {
            result = value * 35.3147;
        } else if (from === 'MMSCFD' && to === 'MMSCMD') {
            result = value / 35.3147;
        }
    }
    else if (type === 'nang_luong') {
        if (from === 'mmBTU' && to === 'GJ') {
            result = value * 1.05506;
        } else if (from === 'GJ' && to === 'mmBTU') {
            result = value / 1.05506;
        }
    }
    else if (type === 'cong_suat') {
        if (from === 'kw' && to === 'HP') {
            result = value * 1.34102;
        } else if (from === 'HP' && to === 'kw') {
            result = value / 1.34102;
        } 
    }
    else if (type === 'khoi_luong') {
        if (from === 'kg' && to === 'lb') {
            result = value * 2.20462;
        } else if (from === 'lb' && to === 'kg') {
            result = value / 2.20462;
        } else if (from === 'kg' && to === 'oz') {
            result = value * 35.274;
        } else if (from === 'oz' && to === 'kg') {
            result = value / 35.274;
        } else if (from === 'lb' && to === 'oz') {
            result = value * 16;
        } else if (from === 'oz' && to === 'lb') {
            result = value / 16;
        }
    }
    else if (type === 'nong_do') {
        // Công thức ppm <-> ppb
        result = (from === 'ppm') ? value * 1000 : value / 1000;
    }

    // Hiển thị kết quả ra màn hình
    document.getElementById('result').innerText = result;
}

// Chạy lần đầu để tự động nạp đơn vị vào menu
updateUnits();
</script>

</body>
</html>
